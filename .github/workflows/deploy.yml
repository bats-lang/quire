name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ATS2
        run: |
          curl -sL "https://raw.githubusercontent.com/ats-lang/ats-lang.github.io/master/FROZEN000/ATS-Postiats/ATS2-Postiats-int-0.4.2.tgz" -o /tmp/ats2.tgz
          mkdir -p ~/.ats2
          tar -xzf /tmp/ats2.tgz -C ~/.ats2
          cd ~/.ats2/ATS2-Postiats-int-0.4.2
          make -j$(nproc) -C src/CBOOT patsopt
          mkdir -p bin
          cp src/CBOOT/patsopt bin/patsopt
          mkdir -p ~/.bats
          ln -sf ~/.ats2/ATS2-Postiats-int-0.4.2 ~/.bats/ats2

      - name: Install WASM tools
        run: sudo apt-get install -y -q lld

      - name: Cache bats compiler
        id: cache-bats
        uses: actions/cache@v4
        with:
          path: ~/bats-bin
          key: bats-from-c-v3-${{ runner.os }}-${{ hashFiles('.github/workflows/check.yml') }}

      - name: Build bats from C
        if: steps.cache-bats.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --repo bats-lang/bats --branch main --status success --workflow check --limit 1 --json databaseId --jq '.[0].databaseId')
          gh run download "$RUN_ID" --repo bats-lang/bats --name bats-c --dir ~/bats-c
          cd ~/bats-c
          make PATSHOME=$HOME/.ats2/ATS2-Postiats-int-0.4.2
          mkdir -p ~/bats-bin
          cp debug/bats ~/bats-bin/bats

      - name: Setup
        run: |
          sudo cp $HOME/bats-bin/bats /bin/bats
          git clone https://github.com/bats-lang/repository-prototype.git $HOME/repository

      - name: Build WASM
        run: |
          bats lock --repository $HOME/repository
          bats build --only wasm --repository $HOME/repository || true
          test -f dist/wasm/app.wasm

      - name: Build PWA generator
        run: bats build --only native --repository $HOME/repository

      - name: Generate PWA
        run: |
          mkdir -p dist/pwa
          dist/debug/gen-pwa

      - name: Copy WASM to PWA
        run: cp dist/wasm/app.wasm dist/pwa/app.wasm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pwa

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
